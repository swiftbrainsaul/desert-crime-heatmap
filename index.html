<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Desert Incident Heatmap</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <div class="panel">
  <a href="deal.html">Deal Analyzer</a>
</div>

<style>
  body { margin:0; font-family: Arial, sans-serif; }
  #map { height: 100vh; width: 100vw; }

  .panel {
    position:absolute;
    top:15px;
    left:15px;
    background:rgba(20,20,20,0.92);
    color:#fff;
    padding:12px;
    border-radius:10px;
    box-shadow:0 2px 12px rgba(0,0,0,0.35);
    z-index:1000;
    width: 320px;
  }
  .panel input {
    width: 100%;
    padding:8px 10px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color:#fff;
    outline:none;
    margin-bottom:10px;
  }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  button {
    padding:7px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background: rgba(255,255,255,0.12);
    color:#fff;
  }
  button.active { background:#fff; color:#111; }

  .label { font-size:12px; opacity:0.9; margin-top:10px; }
  .stat {
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    font-size: 12px;
    line-height: 1.4;
  }

  .slider { width: 100%; margin-top: 6px; }

  .legend {
    display:flex;
    gap:10px;
    margin-top:10px;
    align-items:center;
    flex-wrap:wrap;
    font-size:12px;
    opacity:0.95;
  }
  .swatch { width:14px; height:14px; border-radius:4px; display:inline-block; margin-right:6px; }
  .swatch.red { background:#ff0000; }
  .swatch.gold { background:#ffd54a; }

  .footer {
    position:absolute;
    bottom:12px;
    left:12px;
    background:rgba(20,20,20,0.85);
    color:#fff;
    padding:8px 10px;
    font-size:11px;
    border-radius:8px;
    z-index:1000;
    max-width: 560px;
  }
</style>
</head>

<body>

<div class="panel">
  <input id="searchBox" placeholder="Search listing address (press Enter)..." />

  <div class="row">
    <button id="typeAll" class="active" onclick="setTypeFilter('all')">All</button>
    <button id="typeViolent" onclick="setTypeFilter('violent')">Violent</button>
    <button id="typeProperty" onclick="setTypeFilter('property')">Property</button>
  </div>

  <div class="label">Date window</div>
  <div class="row">
    <button id="d30" onclick="setDays(30)">30d</button>
    <button id="d90" onclick="setDays(90)">90d</button>
    <button id="d180" class="active" onclick="setDays(180)">180d</button>
  </div>

  <div class="label">Intensity</div>
  <input class="slider" id="intensity" type="range" min="0.6" max="4.0" step="0.1" value="6.0"/>

  <div class="legend">
    <span><span class="swatch red"></span>Violent</span>
    <span><span class="swatch gold"></span>Property</span>
  </div>

  <div class="stat" id="stats">
    Search an address to see a 1-mile radius count.
  </div>
</div>

<div id="map"></div>

<div class="footer">
  Heatmap shows incident density based on provided data. Reporting practices vary by agency. This visualization may not reflect all incidents or current conditions.
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
/**
 * ==== CONFIG ====
 * Default date window is 180 days (best for stable, visible heatmaps).
 */
const CITY_POP = {
  "Coachella": 45000,
  "Palm Springs": 45000,
  "Cathedral City": 55000,
  "Desert Hot Springs": 33000,
  "Victorville": 140000,
  "Adelanto": 38000,
  "Hesperia": 105000
};

const PER_CAPITA_SCALE = 50000;      // per 10k residents
const HEAT_RADIUS = 55;
const HEAT_BLUR = 40;
const LISTING_RADIUS_M = 1609.34;    // 1 mile

const GRADIENT_VIOLENT = { 0.15:"#330000", 0.35:"#660000", 0.55:"#990000", 0.75:"#cc0000", 1.0:"#ff0000" };
const GRADIENT_PROPERTY = { 0.15:"#2a1f00", 0.35:"#5a4300", 0.55:"#8a6600", 0.75:"#caa300", 1.0:"#ffd54a" };

const DARK_TILES = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
const DARK_ATTRIB = '&copy; OpenStreetMap contributors &copy; CARTO';

/**
 * ==== STATE ====
 */
const map = L.map('map').setView([34.15, -116.75], 9);
L.tileLayer(DARK_TILES, { maxZoom: 19, attribution: DARK_ATTRIB }).addTo(map);

let fullData = [];
let typeFilter = 'all';
let daysWindow = 180;
let intensityMult = parseFloat(document.getElementById("intensity").value);

let listingMarker = null;
let listingCircle = null;
let listingLatLng = null;

const cityLayers = {};
let allCitiesGroup = L.layerGroup().addTo(map);
let allViolent = null;
let allProperty = null;

const layerControl = L.control.layers({}, { "All Cities": allCitiesGroup }, { collapsed: false }).addTo(map);

/**
 * ==== UTIL ====
 */
function parseDate(d) {
  // expects YYYY-MM-DD
  if (!d) return null;
  const t = Date.parse(d);
  return Number.isFinite(t) ? new Date(t) : null;
}

function cutoffDate(days) {
  const now = new Date();
  return new Date(now.getTime() - days * 24 * 3600 * 1000);
}

function inWindow(dObj) {
  // if no date, include (so you can test)
  if (!dObj || !dObj.date) return true;
  const dt = parseDate(dObj.date);
  if (!dt) return true;
  return dt >= cutoffDate(daysWindow);
}

function perCapitaWeight(city, baseWeight = 1) {
  const pop = CITY_POP[city];
  const raw = (!pop || pop <= 0) ? (baseWeight * 0.2) : ((PER_CAPITA_SCALE / pop) * baseWeight);
  return raw * intensityMult;
}

function pointsFor(city, type) {
  const filtered = fullData.filter(d => {
    if (!d || typeof d.lat !== "number" || typeof d.lon !== "number") return false;
    if (!inWindow(d)) return false;
    if (city && d.city !== city) return false;
    if (type && d.type !== type) return false;
    return true;
  });
  return filtered.map(d => [d.lat, d.lon, perCapitaWeight(d.city, 1)]);
}

function makeHeat(points, gradient) {
  return L.heatLayer(points, { radius: HEAT_RADIUS, blur: HEAT_BLUR, maxZoom: 16, gradient });
}

function rebuildAllCitiesLayers() {
  if (allViolent) allCitiesGroup.removeLayer(allViolent);
  if (allProperty) allCitiesGroup.removeLayer(allProperty);

  allViolent = makeHeat(pointsFor(null, "violent"), GRADIENT_VIOLENT);
  allProperty = makeHeat(pointsFor(null, "property"), GRADIENT_PROPERTY);

  allCitiesGroup.addLayer(allViolent);
  allCitiesGroup.addLayer(allProperty);
}

function buildCityLayersOnce() {
  const cities = [...new Set(fullData.map(d => d?.city).filter(Boolean))];
  cities.forEach(city => {
    const violentLayer = makeHeat([], GRADIENT_VIOLENT);
    const propertyLayer = makeHeat([], GRADIENT_PROPERTY);
    const group = L.layerGroup([violentLayer, propertyLayer]);

    cityLayers[city] = { group, violentLayer, propertyLayer };
    layerControl.addOverlay(group, city);
  });
}

function refreshCityLayers() {
  Object.entries(cityLayers).forEach(([city, obj]) => {
    obj.group.removeLayer(obj.violentLayer);
    obj.group.removeLayer(obj.propertyLayer);

    obj.violentLayer = makeHeat(pointsFor(city, "violent"), GRADIENT_VIOLENT);
    obj.propertyLayer = makeHeat(pointsFor(city, "property"), GRADIENT_PROPERTY);

    obj.group.addLayer(obj.violentLayer);
    obj.group.addLayer(obj.propertyLayer);
  });
  applyTypeVisibility();
}

function applyTypeVisibility() {
  if (allViolent && allProperty) {
    if (typeFilter === "all" || typeFilter === "violent") allCitiesGroup.addLayer(allViolent);
    else allCitiesGroup.removeLayer(allViolent);

    if (typeFilter === "all" || typeFilter === "property") allCitiesGroup.addLayer(allProperty);
    else allCitiesGroup.removeLayer(allProperty);
  }

  Object.values(cityLayers).forEach(obj => {
    if (!obj) return;
    if (typeFilter === "all" || typeFilter === "violent") obj.group.addLayer(obj.violentLayer);
    else obj.group.removeLayer(obj.violentLayer);

    if (typeFilter === "all" || typeFilter === "property") obj.group.addLayer(obj.propertyLayer);
    else obj.group.removeLayer(obj.propertyLayer);
  });
}

function setTypeFilter(type) {
  typeFilter = type;
  ["typeAll","typeViolent","typeProperty"].forEach(id => document.getElementById(id).classList.remove("active"));
  if (type === "all") document.getElementById("typeAll").classList.add("active");
  if (type === "violent") document.getElementById("typeViolent").classList.add("active");
  if (type === "property") document.getElementById("typeProperty").classList.add("active");
  applyTypeVisibility();
}

function setDays(days) {
  daysWindow = days;
  ["d30","d90","d180"].forEach(id => document.getElementById(id).classList.remove("active"));
  if (days === 30) document.getElementById("d30").classList.add("active");
  if (days === 90) document.getElementById("d90").classList.add("active");
  if (days === 180) document.getElementById("d180").classList.add("active");

  rebuildAllCitiesLayers();
  refreshCityLayers();
  updateStats();
}

function haversineMeters(a, b) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat);
  const dLon = toRad(b.lng - a.lng);
  const lat1 = toRad(a.lat);
  const lat2 = toRad(b.lat);
  const s = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

function updateStats() {
  const el = document.getElementById("stats");
  if (!listingLatLng) {
    el.textContent = "Search an address to see a 1-mile radius count.";
    return;
  }

  const center = { lat: listingLatLng.lat, lng: listingLatLng.lng };
  const filtered = fullData.filter(d => {
    if (!d || typeof d.lat !== "number" || typeof d.lon !== "number") return false;
    if (!inWindow(d)) return false;
    const dist = haversineMeters(center, { lat: d.lat, lng: d.lon });
    return dist <= LISTING_RADIUS_M;
  });

  const violent = filtered.filter(d => d.type === "violent").length;
  const property = filtered.filter(d => d.type === "property").length;

  el.innerHTML = `
    <b>Within 1 mile</b><br/>
    Violent: <b>${violent}</b><br/>
    Property: <b>${property}</b><br/>
    Total: <b>${filtered.length}</b><br/>
    Window: last <b>${daysWindow}</b> days
  `;
}

function setListing(lat, lon, label) {
  const ll = [lat, lon];
  listingLatLng = L.latLng(lat, lon);

  if (listingMarker) map.removeLayer(listingMarker);
  if (listingCircle) map.removeLayer(listingCircle);

  listingMarker = L.marker(ll).addTo(map);
  if (label) listingMarker.bindPopup(label).openPopup();

  listingCircle = L.circle(ll, {
    radius: LISTING_RADIUS_M,
    weight: 2,
    opacity: 0.95,
    color: "#ffffff",
    fillColor: "#ffffff",
    fillOpacity: 0.06
  }).addTo(map);

  map.fitBounds(listingCircle.getBounds(), { padding: [25, 25] });
  updateStats();
}

// Nominatim
async function geocodeAddress(q) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`;
  const res = await fetch(url);
  const data = await res.json();
  if (Array.isArray(data) && data.length > 0) return data[0];
  return null;
}
async function goSearch(q) {
  try {
    const r = await geocodeAddress(q);
    if (!r) return;
    setListing(parseFloat(r.lat), parseFloat(r.lon), q);
  } catch (e) {
    console.error("Geocode failed", e);
  }
}

function autoZoomFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const addr = params.get("address");
  if (addr) {
    document.getElementById("searchBox").value = addr;
    goSearch(addr);
  }
}

/**
 * ==== EVENTS ====
 */
document.getElementById("searchBox").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    const q = this.value.trim();
    if (q) goSearch(q);
  }
});

document.getElementById("intensity").addEventListener("input", function() {
  intensityMult = parseFloat(this.value);
  rebuildAllCitiesLayers();
  refreshCityLayers();
});

// LOAD DATA
fetch('crime_data.json')
  .then(r => r.json())
  .then(data => {
    fullData = Array.isArray(data) ? data : [];
    buildCityLayersOnce();
    rebuildAllCitiesLayers();
    refreshCityLayers();
    autoZoomFromUrl();
  })
  .catch(err => console.error("Failed to load crime_data.json", err));
</script>

</body>
</html>
